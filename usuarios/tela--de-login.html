<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(45deg, yellow, black);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 40px;
      border-radius: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: dodgerblue;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: deepskyblue;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <input id="login-nome" type="text" placeholder="Nome" required />
    <input id="login-senha" type="password" placeholder="Senha" required />
    <button onclick="logar()">Entrar</button>
    <p>Não tem uma conta?</p>
    <button onclick="window.location.href='formulario.html'">Cadastre-se</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
